          type: string
          format: date-time
          readOnly: true
      required:
      - comment
      - created_at
      - id
      - product
      - rating
      - user
    RoleEnum:
      enum:
      - customer
      - vendor
      type: string
      description: |-
        * `customer` - Customer
        * `vendor` - Vendor
    StatusEnum:
      enum:
      - created
      - pending_shipment
      - shipped
      - paid
      - payment_failed
      type: string
      description: |-
        * `created` - Created
        * `pending_shipment` - Pending Shipment
        * `shipped` - Shipped
        * `paid` - Paid
        * `payment_failed` - Payment Failed
